name: container

on:
  push:
    branches: ['main']
    tags-ignore: ['v*']

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version-file: go.mod
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Build and push image
        env:
          IMAGE: ghcr.io/tpaulus/simple-idp
          SHA_TAG: sha-${{ github.sha }}
        run: |
          set -euo pipefail
          docker buildx create --use --name simple-idp-builder || docker buildx use simple-idp-builder
          docker buildx build \
            --push \
            --platform linux/amd64 \
            --provenance=true \
            --sbom=true \
            --tag "$IMAGE:$SHA_TAG" \
            --build-arg VERSION="$SHA_TAG" \
            --build-arg REVISION="${{ github.sha }}" \
            --metadata-file "${{ runner.temp }}/build-metadata.json" \
            .
      - name: Sign image
        env:
          COSIGN_EXPERIMENTAL: "1"
          IMAGE: ghcr.io/tpaulus/simple-idp
        run: |
          DIGEST=$(jq -r '."containerimage.digest"' "${{ runner.temp }}/build-metadata.json")
          if [[ -z "$DIGEST" || "$DIGEST" == "null" ]]; then
            echo "Error: could not extract image digest from build metadata" >&2
            exit 1
          fi
          cosign sign --yes "$IMAGE@$DIGEST"

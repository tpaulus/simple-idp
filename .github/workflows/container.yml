name: container

on:
  push:
    branches: ['main']
    tags-ignore: ['v*']

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Install cosign
        run: go install github.com/sigstore/cosign/v2/cmd/cosign@v2.4.1
      - name: Build and push image
        env:
          IMAGE: ghcr.io/tpaulus/simple-idp
          SHA_TAG: sha-${{ github.sha }}
        run: |
          set -euo pipefail
          docker buildx create --use --name simple-idp-builder || docker buildx use simple-idp-builder
          docker buildx build \
            --push \
            --platform linux/amd64 \
            --provenance=true \
            --sbom=true \
            --tag "$IMAGE:$SHA_TAG" \
            --build-arg VERSION="$SHA_TAG" \
            --build-arg REVISION="${{ github.sha }}" \
            .
      - name: Sign image
        env:
          COSIGN_EXPERIMENTAL: "1"
          IMAGE: ghcr.io/tpaulus/simple-idp:sha-${{ github.sha }}
        run: |
          "$(go env GOPATH)/bin/cosign" sign --yes "$IMAGE"

name: test

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
      - name: Prepare sample secrets
        shell: bash
        run: |
          set -euo pipefail
          openssl genrsa -out signing.key 2048
          openssl req -x509 -new -nodes -key signing.key -sha256 -days 1 -subj '/CN=test-ca' -out client-ca.crt
          {
            echo 'CLIENT_CA_CRT<<EOF'
            cat client-ca.crt
            echo EOF
            echo 'OIDC_SIGNING_KEY<<EOF'
            cat signing.key
            echo EOF
            echo 'GRAFANA_OIDC_CLIENT_SECRET=test-secret'
            echo 'TOM_EMAIL=tom@example.test'
            echo 'MEL_EMAIL=mel@example.test'
          } >> "$GITHUB_ENV"
      - name: Test
        run: go test ./...
      - name: Race test
        run: go test -race ./...
      - name: Coverage
        run: go test ./... -coverprofile=coverage.out
      - name: Lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9
        with:
          version: latest
      - name: Vet
        run: go vet ./...
      - name: Validate config
        run: go run ./cmd/simple-idp --config ./examples/config.yaml --validate-config >/tmp/redacted-config.yaml
      - name: Build image
        run: docker build .
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage
          path: coverage.out

apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-idp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: simple-idp
  template:
    metadata:
      labels:
        app: simple-idp
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: simple-idp
          image: ghcr.io/tpaulus/simple-idp:sha-<git-sha>
          args: ["--config", "/etc/simple-idp/config.yaml", "--http-addr", ":8080", "--log-format", "json"]
          ports:
            - containerPort: 8080
          env:
            - name: CLIENT_CA_CRT
              valueFrom:
                secretKeyRef:
                  name: simple-idp-secrets
                  key: CLIENT_CA_CRT
            - name: OIDC_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: simple-idp-secrets
                  key: OIDC_SIGNING_KEY
            - name: GRAFANA_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: simple-idp-secrets
                  key: GRAFANA_OIDC_CLIENT_SECRET
            - name: TOM_EMAIL
              valueFrom:
                secretKeyRef:
                  name: simple-idp-secrets
                  key: TOM_EMAIL
          volumeMounts:
            - name: config
              mountPath: /etc/simple-idp
              readOnly: true
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: config
          configMap:
            name: simple-idp-config

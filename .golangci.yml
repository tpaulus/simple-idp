version: "2"

formatters:
  enable:
    - gofmt

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused
    - revive
    - gosec
    - misspell
    - gocritic
    - bodyclose
    - nilerr
    - unconvert
    - prealloc
    - unparam
  settings:
    gosec:
      excludes:
        - G115  # integer overflow conversion (too noisy for crypto work)
    revive:
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
